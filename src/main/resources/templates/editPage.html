<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books</title>

    <th:block th:insert="~{/fragments/fragments :: stylelinks}"></th:block>

</head>

<body>

    <div class="p-4">

        <h1>Modifica di [[${pizza.name}]]</h1>

        <div>

            <form th:action="@{/pizze/edit/{id}(id=${pizza.id})}" method="post" th:object="${pizza}" id="pizza-form">

                <div class="mb-3 p-3" th:if="${#fields.hasErrors()}">
                    <ul class="alert alert-danger">
                        <li th:each="error : ${#fields.allErrors()}" th:text="${error}" />
                    </ul>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="name">Modifica il nome della pizza:</label>
                    <input class="form-control" type="text" id="name" th:field="*{name}">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="description">Modifica la descrizione della pizza:</label>
                    <input class="form-control" type="text" id="description" th:field="*{description}">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="imagePath">Modifica il path per l'immagine della pizza:</label>
                    <input class="form-control" type="text" id="imagePath" th:field="*{image}">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="price">Modifica il prezzo della pizza:</label>
                    <input class="form-control" type="text" id="price" th:field="*{price}">
                </div>
                <div class="d-flex justify-content-around">
                    <input type="submit" class="btn btn-primary" value="Aggiorna pizza">
                </div>

            </form>

        </div>

    </div>

</body>
